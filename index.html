<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- 기본 브라우저 탭 제목 -->
    <title>빛의 사자 성전기도 인증</title>

    <!-- 카카오톡 등 링크 공유 시 나타나는 미리보기(Open Graph) 설정 -->
    <meta property="og:title" content="빛의 사자 남선교회 성전기도 인증" />
    <meta property="og:description" content="기도의 자리를 지키는 당신을 축복합니다. 링크를 눌러 인증에 참여해주세요!" />
    
    <!-- 💡 아래 content="원하는 이미지 인터넷 주소" 부분에 교회 로고나 포스터 이미지 링크를 넣으세요 -->
    <!-- 현재는 임시로 예쁜 기도/하늘 배경 이미지가 들어가 있습니다. -->
    <meta property="og:image" content="https://raw.githubusercontent.com/leeeuiyoung/IMAGE/refs/heads/main/shine.jpg?auto=format&fit=crop&q=80&w=800&h=400" />
    
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://namseon-prayer-app.vercel.app/" />

    <!-- 디자인(Tailwind CSS)을 불러오는 코드 -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
